name: Migrate Supabase Database

# Trigger conditions:
# - workflow_dispatch: Manual trigger from GitHub Actions tab
# - push to main with changes in supabase/migrations/ or this workflow file
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Validate all required secrets exist before proceeding
      # This prevents cryptic errors later in the workflow
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then
            echo "❌ Missing SUPABASE_PROJECT_ID"
            echo "   Add it to: Repository Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "❌ Missing SUPABASE_ACCESS_TOKEN"
            echo "   Generate at: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "❌ Missing SUPABASE_DB_PASSWORD"
            echo "   This is the password you set when creating your Supabase project"
            exit 1
          fi
          echo "✅ All required secrets are configured"
          echo "   Using project: ${{ secrets.SUPABASE_PROJECT_ID }}"

      # Step 3: Set up Node.js environment with cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 4: Use official Supabase CLI setup
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Step 5: Connect to production Supabase project
      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Step 6: Show which migrations will be applied (for transparency)
      - name: Show migration plan
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Step 7: Apply pending migrations to production database
      - name: Run migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Step 8: Success confirmation
      - name: Migration successful
        if: success()
        run: |
          echo "✅ Migrations applied successfully to production database"
          echo ""
          echo "Next steps:"
          echo "  1. Verify changes in Supabase dashboard: https://supabase.com/dashboard"
          echo "  2. Monitor your production app for any issues"
          echo "  3. Check logs if needed: Supabase Dashboard → Logs → Postgres"

      # Step 9: Detailed error guidance if migration fails
      - name: Migration failed
        if: failure()
        run: |
          echo "Migration failed! Check the logs above for details"
          echo ""
          echo "Common issues and solutions:"
          echo "  • Invalid migration SQL:"
          echo "    - Review the .sql file in supabase/migrations/"
          echo "    - Test locally with: npx supabase db push"
          echo ""
          echo "  • Missing GitHub secrets:"
          echo "    - SUPABASE_PROJECT_ID"
          echo "    - SUPABASE_ACCESS_TOKEN"
          echo "    - SUPABASE_DB_PASSWORD"
          echo "    Add them in: Repository Settings → Secrets and variables → Actions"
          echo ""
          echo "  • Network or authentication issues:"
          echo "    - Verify SUPABASE_ACCESS_TOKEN is not expired"
          echo "    - Generate a new token at: https://supabase.com/dashboard/account/tokens"
          echo "    - Update the GitHub secret with the new token"
          echo ""
          echo "  • Database connection issues:"
          echo "    - Check Supabase status: https://status.supabase.com"
          echo "    - View logs: Supabase Dashboard → Logs → Postgres"
          echo ""
          exit 1
